services:
  postgres:
    image: docker.io/neondatabase/neon_local:v1.5
    container_name: reports-neon-local
    restart: always
    ports:
      - "5432:5432"
    environment:
      NEON_API_KEY: ${NEON_API_KEY}
      NEON_PROJECT_ID: ${NEON_PROJECT_ID}
      PARENT_BRANCH_ID: ${PARENT_BRANCH_ID}


